<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
        body{
            font-family:Arial;
            padding:20px;
            background:#f5f5f5;
        }

        .item{
            background:white;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
        }

        button{
            padding:10px;
            border:none;
            background:green;
            color:white;
            cursor:pointer;
            margin-top:10px;
        }
    </style>
</head>

<body>

    <h1>Cart</h1>

    <div id="cartItems"></div>

    <button onclick="placeOrder()">Place Order</button>

    <script>

        async function loadCart(){

            const response = await fetch(
                "https://codealpha-ecommerce-jkk0.onrender.com/cart/user1"
            );

            const cart = await response.json();

            const cartDiv = document.getElementById("cartItems");

            cartDiv.innerHTML = "";

            if(!cart.items || cart.items.length === 0){
                cartDiv.innerHTML = "<h3>Cart Empty</h3>";
                return;
            }

            cart.items.forEach(item => {

                cartDiv.innerHTML += `
                
                <div class="item">

                    <h2>${item.name}</h2>

                    <p>₹${item.price}</p>

                    <p>Quantity: ${item.quantity}</p>

                </div>

                `;
            });

        }

        async function placeOrder(){

            await fetch(
                "https://codealpha-ecommerce-jkk0.onrender.com/order/place",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        userId:"user1"
                    })
                }
            );

            alert("Order Placed");

            loadCart();

        }

        loadCart();

    </script>

</body>
</html>
