<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazingg Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#eaeded;
}

#authPage{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#131921,#232f3e);
    padding:20px;
}

.auth-container{
    background:white;
    padding:35px;
    border-radius:15px;
    width:100%;
    max-width:420px;
}

.auth-container h1{
    text-align:center;
    margin-bottom:20px;
}

.auth-container input{
    width:100%;
    padding:13px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    cursor:pointer;
}

.auth-container button,
.product-card button,
.place-order-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#ff9900;
    border-radius:8px;
    font-weight:bold;
}

.switch-text{
    text-align:center;
    margin-top:15px;
}

.switch-text span{
    color:blue;
    cursor:pointer;
}

#storePage{
    display:none;
}

nav{
    background:#131921;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    color:#ff9900;
    font-size:28px;
    font-weight:bold;
}

.search-box{
    flex:1;
    display:flex;
    max-width:600px;
}

.search-box input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:5px 0 0 5px;
}

.search-box button{
    width:60px;
    border:none;
    background:#febd69;
    border-radius:0 5px 5px 0;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:12px;
}

.logout-btn{
    background:red;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
}

.cart-badge{
    background:red;
    color:white;
    padding:5px 10px;
    border-radius:50px;
}

.hero{
    background:linear-gradient(to right,#131921,#37475a);
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:50px;
}

.section{
    padding:40px 25px;
}

.section-title{
    font-size:34px;
    margin-bottom:25px;
}

#products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.product-card{
    background:white;
    padding:18px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.product-card img{
    width:100%;
    height:230px;
    object-fit:cover;
    border-radius:10px;
}

.product-card h3{
    margin-top:12px;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
}

.buy-btn{
    margin-top:10px;
    background:green !important;
    color:white;
}

.delete-btn{
    margin-top:10px;
    background:red !important;
    color:white;
}

.cart-item{
    background:white;
    padding:18px;
    border-radius:10px;
    margin-bottom:15px;
}

.place-order-btn{
    max-width:300px;
    background:green;
    color:white;
}

.remove-btn{
    background:red !important;
    color:white !important;
    margin-top:10px;
}

footer{
    background:#131921;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

@media(max-width:768px){
    nav{
        flex-direction:column;
    }

    .hero h1{
        font-size:35px;
    }
}
</style>
</head>

<body>

<div id="authPage">

    <div class="auth-container" id="loginBox">
        <h1>Login</h1>

        <input type="email" id="loginEmail" placeholder="Enter Email">
        <input type="password" id="loginPassword" placeholder="Enter Password">

        <button onclick="loginUser()">Login</button>

        <div class="switch-text">
            Don't have account?
            <span onclick="showRegister()">Register</span>
        </div>
    </div>

    <div class="auth-container" id="registerBox" style="display:none;">
        <h1>Register</h1>

        <input type="text" id="regName" placeholder="Enter Name">
        <input type="email" id="regEmail" placeholder="Enter Email">
        <input type="password" id="regPassword" placeholder="Enter Password">

        <button onclick="registerUser()">Register</button>

        <div class="switch-text">
            Already have account?
            <span onclick="showLogin()">Login</span>
        </div>
    </div>

</div>

<div id="storePage">

<nav>
    <div class="logo">Amazingg Store</div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
        <button>🔍</button>
    </div>

    <div class="nav-right">
        <span id="welcomeUser"></span>
        <span class="cart-badge" id="cartCount">0</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<section class="hero">
    <h1>Welcome To Amazingg Store</h1>
    <p>Amazon-style Full Stack E-Commerce Project</p>
</section>

<section class="section">
    <h2 class="section-title">Trending Products</h2>
    <div id="products"></div>
</section>

<section class="section">
    <h2 class="section-title">Your Cart</h2>
    <div id="cartItems"></div>
    <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
</section>

<footer>
    <h2>Amazingg Store</h2>
    <p>HTML, CSS, JavaScript, Node.js, Express.js, MongoDB</p>
</footer>

</div>

<script>
const BASE_URL = "https://codealpha-ecommerce-jkk0.onrender.com";

let allProducts = [];

if(localStorage.getItem("user")){
    openStore();
}

function showRegister(){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("registerBox").style.display = "block";
}

function showLogin(){
    document.getElementById("registerBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
}

async function registerUser(){
    const name = document.getElementById("regName").value;
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;

    const res = await fetch(`${BASE_URL}/register`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,email,password})
    });

    const data = await res.text();
    alert(data);
    showLogin();
}

async function loginUser(){
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch(`${BASE_URL}/login`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
    });

    const data = await res.text();

    if(data === "Login Success"){
        localStorage.setItem("user", email);
        openStore();
    }else{
        alert("Invalid Login");
    }
}

function openStore(){
    document.getElementById("authPage").style.display = "none";
    document.getElementById("storePage").style.display = "block";

    const user = localStorage.getItem("user");
    document.getElementById("welcomeUser").innerText = user;

    loadProducts();
    loadCart();
}

function logout(){
    localStorage.removeItem("user");
    location.reload();
}

async function loadProducts(){
    const res = await fetch(`${BASE_URL}/products`);
    const products = await res.json();

    allProducts = products;
    displayProducts(products);
}

function displayProducts(products){
    const productDiv = document.getElementById("products");

    productDiv.innerHTML = "";

    products.forEach(product => {
        productDiv.innerHTML += `
            <div class="product-card">
                <img src="${product.image}">
                <h3>${product.name}</h3>
                <p class="price">₹${product.price}</p>
                <p>${product.description}</p>
                <p>Category: ${product.category}</p>

                <button onclick="addToCart('${product._id}','${product.name}',${product.price})">
                    Add To Cart
                </button>

                <button class="buy-btn" onclick="buyNow('${product._id}','${product.name}',${product.price})">
                    Buy Now
                </button>

                <button class="delete-btn" onclick="deleteProduct('${product._id}')">
                    Delete Product
                </button>
            </div>
        `;
    });
}

function searchProducts(){
    const value = document.getElementById("searchInput").value.toLowerCase();

    const filtered = allProducts.filter(product =>
        product.name.toLowerCase().includes(value) ||
        product.category.toLowerCase().includes(value)
    );

    displayProducts(filtered);
}

async function addToCart(id,name,price){
    await fetch(`${BASE_URL}/cart/add`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            userId:localStorage.getItem("user"),
            productId:id,
            name,
            price
        })
    });

    alert("Added To Cart");
    loadCart();
}

async function buyNow(id,name,price){
    await addToCart(id,name,price);

    document
        .querySelector("#cartItems")
        .scrollIntoView({
            behavior:"smooth"
        });

    alert("Product added. Complete your order below.");
}

async function deleteProduct(id){
    const confirmDelete = confirm("Are you sure you want to delete this product?");

    if(!confirmDelete) return;

    const res = await fetch(`${BASE_URL}/delete-product/${id}`,{
        method:"DELETE"
    });

    const data = await res.text();

    alert(data);

    loadProducts();
}

async function loadCart(){
    const user = localStorage.getItem("user");

    const res = await fetch(`${BASE_URL}/cart/${user}`);
    const cart = await res.json();

    const cartDiv = document.getElementById("cartItems");

    cartDiv.innerHTML = "";

    let count = 0;
    let total = 0;

    if(!cart.items || cart.items.length === 0){
        cartDiv.innerHTML = "<h3>Cart Empty</h3>";
        document.getElementById("cartCount").innerText = 0;
        return;
    }

    cart.items.forEach(item => {
        count += item.quantity;
        total += item.price * item.quantity;

        cartDiv.innerHTML += `
            <div class="cart-item">
                <h3>${item.name}</h3>
                <p>Price: ₹${item.price}</p>
                <p>Quantity: ${item.quantity}</p>
                <p>Subtotal: ₹${item.price * item.quantity}</p>

                <button class="remove-btn" onclick="removeFromCart('${item.productId}')">
                    Remove
                </button>
            </div>
        `;
    });

    cartDiv.innerHTML += `<h2>Total Amount: ₹${total}</h2>`;

    document.getElementById("cartCount").innerText = count;
}

async function removeFromCart(productId){
    const user = localStorage.getItem("user");

    const res = await fetch(`${BASE_URL}/cart/remove`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({userId:user, productId})
    });

    const data = await res.text();

    alert(data);

    loadCart();
}

async function placeOrder(){
    const res = await fetch(`${BASE_URL}/order/place`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            userId:localStorage.getItem("user")
        })
    });

    const data = await res.text();

    alert(data);

    loadCart();
}
</script>

</body>
</html>
