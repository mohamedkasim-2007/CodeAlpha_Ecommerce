<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazingg Store</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        nav{
            background:black;
            color:white;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h1{
            font-size:28px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:18px;
        }

        .hero{
            background:linear-gradient(to right,#111,#444);
            color:white;
            padding:80px 20px;
            text-align:center;
        }

        .hero h2{
            font-size:45px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
        }

        .section{
            padding:40px 20px;
        }

        .section-title{
            font-size:35px;
            margin-bottom:30px;
            text-align:center;
        }

        #products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
        }

        .card h3{
            margin-top:15px;
            font-size:24px;
        }

        .card p{
            margin-top:10px;
        }

        .price{
            color:green;
            font-size:22px;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            background:black;
            color:white;
            font-size:16px;
            cursor:pointer;
            border-radius:8px;
        }

        button:hover{
            background:#333;
        }

        .form-container{
            max-width:450px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            margin-bottom:40px;
        }

        .form-container input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        #cartItems{
            margin-top:20px;
        }

        .cart-item{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:15px;
        }

        footer{
            background:black;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }

    </style>

</head>
<body>

    <nav>

        <h1>Amazingg Store</h1>

        <div>
            <a href="#productsSection">Products</a>
            <a href="#registerSection">Register</a>
            <a href="#loginSection">Login</a>
            <a href="#cartSection">Cart</a>
        </div>

    </nav>

    <section class="hero">

        <h2>Welcome To Amazingg Store</h2>

        <p>Professional Full Stack E-Commerce Website</p>

    </section>

    <!-- PRODUCTS -->

    <section class="section" id="productsSection">

        <h2 class="section-title">Products</h2>

        <div id="products"></div>

    </section>

    <!-- REGISTER -->

    <section class="section" id="registerSection">

        <h2 class="section-title">Register</h2>

        <div class="form-container">

            <input type="text" id="regName" placeholder="Enter Name">

            <input type="email" id="regEmail" placeholder="Enter Email">

            <input type="password" id="regPassword" placeholder="Enter Password">

            <button onclick="registerUser()">Register</button>

        </div>

    </section>

    <!-- LOGIN -->

    <section class="section" id="loginSection">

        <h2 class="section-title">Login</h2>

        <div class="form-container">

            <input type="email" id="loginEmail" placeholder="Enter Email">

            <input type="password" id="loginPassword" placeholder="Enter Password">

            <button onclick="loginUser()">Login</button>

        </div>

    </section>

    <!-- CART -->

    <section class="section" id="cartSection">

        <h2 class="section-title">Cart</h2>

        <div id="cartItems"></div>

        <div style="max-width:300px;margin:auto;">
            <button onclick="placeOrder()">Place Order</button>
        </div>

    </section>

    <footer>

        <h3>© 2026 Amazingg Store | Full Stack Project</h3>

    </footer>

    <script>

        const BASE_URL = "https://codealpha-ecommerce-jkk0.onrender.com";

        // LOAD PRODUCTS

        async function loadProducts(){

            const response = await fetch(`${BASE_URL}/products`);

            const products = await response.json();

            const productDiv = document.getElementById("products");

            productDiv.innerHTML = "";

            products.forEach(product => {

                productDiv.innerHTML += `

                    <div class="card">

                        <img src="${product.image}" />

                        <h3>${product.name}</h3>

                        <p class="price">₹${product.price}</p>

                        <p>${product.description}</p>

                        <button onclick="addToCart('${product._id}','${product.name}',${product.price})">
                            Add To Cart
                        </button>

                    </div>

                `;

            });

        }

        // REGISTER

        async function registerUser(){

            const response = await fetch(`${BASE_URL}/register`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    name:document.getElementById("regName").value,

                    email:document.getElementById("regEmail").value,

                    password:document.getElementById("regPassword").value

                })

            });

            const data = await response.text();

            alert(data);

        }

        // LOGIN

        async function loginUser(){

            const response = await fetch(`${BASE_URL}/login`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    email:document.getElementById("loginEmail").value,

                    password:document.getElementById("loginPassword").value

                })

            });

            const data = await response.text();

            alert(data);

        }

        // ADD TO CART

        async function addToCart(id,name,price){

            await fetch(`${BASE_URL}/cart/add`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    userId:"user1",
                    productId:id,
                    name:name,
                    price:price

                })

            });

            alert("Added To Cart");

            loadCart();

        }

        // LOAD CART

        async function loadCart(){

            const response = await fetch(`${BASE_URL}/cart/user1`);

            const cart = await response.json();

            const cartDiv = document.getElementById("cartItems");

            cartDiv.innerHTML = "";

            if(!cart.items || cart.items.length === 0){

                cartDiv.innerHTML = "<h3 style='text-align:center'>Cart Empty</h3>";

                return;

            }

            cart.items.forEach(item => {

                cartDiv.innerHTML += `

                    <div class="cart-item">

                        <h3>${item.name}</h3>

                        <p>Price: ₹${item.price}</p>

                        <p>Quantity: ${item.quantity}</p>

                    </div>

                `;

            });

        }

        // PLACE ORDER

        async function placeOrder(){

            const response = await fetch(`${BASE_URL}/order/place`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    userId:"user1"

                })

            });

            const data = await response.text();

            alert(data);

            loadCart();

        }

        loadProducts();

        loadCart();

    </script>

</body>
</html>
