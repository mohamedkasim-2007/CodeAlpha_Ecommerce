<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Amazingg Store</title>

    <style>

       /* ===== NEW MODERN THEME ===== */

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;   /* dark navy background */
  color: #e2e8f0;
}

/* Navbar */
nav {
  background: #111827;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Links */
a {
  color: #38bdf8;
  text-decoration: none;
}

/* Product Cards */
.product-card {
  background: #1e293b;
  border-radius: 15px;
  padding: 15px;
  margin: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.product-card:hover {
  transform: scale(1.05);
}

/* Buttons */
button {
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.85;
}

/* Search Bar */
input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* Cart badge */
#cart-count {
  background: red;
  color: white;
  padding: 3px 8px;
  border-radius: 50%;
}

        /* LOGIN PAGE */

        #authPage{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#131921,#232f3e);
            padding:20px;
        }

        .auth-container{
            background:white;
            padding:40px;
            border-radius:15px;
            width:100%;
            max-width:400px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        .auth-container h1{
            text-align:center;
            margin-bottom:25px;
            color:#131921;
        }

        .auth-container input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        .auth-container button{
            width:100%;
            padding:14px;
            border:none;
            background:#ff9900;
            color:black;
            font-size:18px;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
        }

        .switch-text{
            text-align:center;
            margin-top:15px;
        }

        .switch-text span{
            color:blue;
            cursor:pointer;
        }

        /* STORE */

        #storePage{
            display:none;
        }

        nav{
            background:#131921;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
            position:sticky;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:30px;
            color:#ff9900;
            font-weight:bold;
        }

        .search-box{
            flex:1;
            max-width:600px;
            display:flex;
        }

        .search-box input{
            flex:1;
            padding:12px;
            border:none;
            outline:none;
            border-radius:5px 0 0 5px;
        }

        .search-box button{
            width:70px;
            border:none;
            background:#febd69;
            cursor:pointer;
            border-radius:0 5px 5px 0;
        }

        .nav-right{
            display:flex;
            gap:20px;
            align-items:center;
        }

        .cart-badge{
            background:red;
            padding:5px 10px;
            border-radius:50px;
        }

        .logout-btn{
            padding:10px 18px;
            background:red;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        /* HERO */

        .hero{
            height:400px;
            background:linear-gradient(to right,#131921,#37475a);
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            padding:20px;
        }

        .hero h1{
            font-size:55px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:22px;
        }

        /* PRODUCTS */

        .section{
            padding:50px 30px;
        }

        .section-title{
            font-size:38px;
            margin-bottom:35px;
        }

        #products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:30px;
        }

        .product-card{
            background:white;
            border-radius:15px;
            padding:20px;
            transition:0.3s;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .product-card:hover{
            transform:translateY(-8px);
        }

        .product-card img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
        }

        .product-card h3{
            margin-top:15px;
            font-size:24px;
        }

        .price{
            color:green;
            font-size:22px;
            font-weight:bold;
            margin-top:10px;
        }

        .rating{
            color:orange;
            margin-top:10px;
        }

        .product-card button{
            width:100%;
            padding:12px;
            border:none;
            background:#131921;
            color:white;
            border-radius:8px;
            cursor:pointer;
            margin-top:15px;
        }

        /* CART */

        .cart-item{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .place-order-btn{
            padding:15px 25px;
            border:none;
            background:green;
            color:white;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
        }

        footer{
            background:#131921;
            color:white;
            text-align:center;
            padding:25px;
            margin-top:50px;
        }

        @media(max-width:768px){

            nav{
                flex-direction:column;
            }

            .hero h1{
                font-size:38px;
            }

            .hero p{
                font-size:18px;
            }

        }

    </style>

</head>
<body>

    <!-- AUTH PAGE -->

    <div id="authPage">

        <!-- LOGIN -->

        <div class="auth-container" id="loginBox">

            <h1>Login</h1>

            <input type="email" id="loginEmail" placeholder="Enter Email">

            <input type="password" id="loginPassword" placeholder="Enter Password">

            <button onclick="loginUser()">
                Login
            </button>

            <div class="switch-text">
                Don't have account?
                <span onclick="showRegister()">
                    Register
                </span>
            </div>

        </div>

        <!-- REGISTER -->

        <div class="auth-container" id="registerBox" style="display:none;">

            <h1>Register</h1>

            <input type="text" id="regName" placeholder="Enter Name">

            <input type="email" id="regEmail" placeholder="Enter Email">

            <input type="password" id="regPassword" placeholder="Enter Password">

            <button onclick="registerUser()">
                Register
            </button>

            <div class="switch-text">
                Already have account?
                <span onclick="showLogin()">
                    Login
                </span>
            </div>

        </div>

    </div>

    <!-- STORE PAGE -->

    <div id="storePage">

        <!-- NAVBAR -->

        <nav>

            <div class="logo">
                Amazingg Store
            </div>

            <div class="search-box">

                <input
                    type="text"
                    placeholder="Search products..."
                    id="searchInput"
                    onkeyup="searchProducts()"
                >

                <button>🔍</button>

            </div>

            <div class="nav-right">

                <h3 id="welcomeUser"></h3>

                <div class="cart-badge" id="cartCount">
                    0
                </div>

                <button class="logout-btn" onclick="logout()">
                    Logout
                </button>

            </div>

        </nav>

        <!-- HERO -->

        <section class="hero">

            <div>

                <h1>Welcome To Amazingg Store</h1>

                <p>Search, Add To Cart and Order Products</p>

            </div>

        </section>

        <!-- PRODUCTS -->

        <section class="section">

            <h2 class="section-title">
                Trending Products
            </h2>

            <div id="products"></div>

        </section>

        <!-- CART -->

        <section class="section">

            <h2 class="section-title">
                Your Cart
            </h2>

            <div id="cartItems"></div>

            <button class="place-order-btn" onclick="placeOrder()">
                Place Order
            </button>

        </section>

        <!-- FOOTER -->

        <footer>

            <h2>Amazingg Store</h2>

            <p>Professional Full Stack E-Commerce Website</p>

        </footer>

    </div>

    <script>

        const BASE_URL =
            "https://codealpha-ecommerce-jkk0.onrender.com";

        let allProducts = [];

        // CHECK LOGIN

        if(localStorage.getItem("user")){

            openStore();

        }

        // SHOW REGISTER

        function showRegister(){

            document.getElementById("loginBox").style.display = "none";

            document.getElementById("registerBox").style.display = "block";

        }

        // SHOW LOGIN

        function showLogin(){

            document.getElementById("registerBox").style.display = "none";

            document.getElementById("loginBox").style.display = "block";

        }

        // REGISTER

        async function registerUser(){

            const name =
                document.getElementById("regName").value;

            const email =
                document.getElementById("regEmail").value;

            const password =
                document.getElementById("regPassword").value;

            const response = await fetch(
                `${BASE_URL}/register`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        name,
                        email,
                        password
                    })
                }
            );

            const data = await response.text();

            alert(data);

            showLogin();

        }

        // LOGIN

        async function loginUser(){

            const email =
                document.getElementById("loginEmail").value;

            const password =
                document.getElementById("loginPassword").value;

            const response = await fetch(
                `${BASE_URL}/login`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        email,
                        password
                    })
                }
            );

            const data = await response.text();

            if(data === "Login Success"){

                localStorage.setItem("user", email);

                openStore();

            }
            else{

                alert("Invalid Login");

            }

        }

        // OPEN STORE

        function openStore(){

            document.getElementById("authPage").style.display = "none";

            document.getElementById("storePage").style.display = "block";

            document.getElementById("welcomeUser").innerText =
                localStorage.getItem("user");

            loadProducts();

            loadCart();

        }

        // LOGOUT

        function logout(){

            localStorage.removeItem("user");

            location.reload();

        }

        // LOAD PRODUCTS

        async function loadProducts(){

            const response = await fetch(
                `${BASE_URL}/products`
            );

            const products = await response.json();

            allProducts = products;

            displayProducts(products);

        }

        // DISPLAY PRODUCTS

        function displayProducts(products){

            const productDiv =
                document.getElementById("products");

            productDiv.innerHTML = "";

            products.forEach(product => {

                productDiv.innerHTML += `

                    <div class="product-card">

                        <img src="${product.image}" />

                        <h3>${product.name}</h3>

                        <div class="rating">
                            ⭐⭐⭐⭐☆
                        </div>

                        <div class="price">
                            ₹${product.price}
                        </div>

                        <p>${product.description}</p>

                        <button onclick="addToCart(
                            '${product._id}',
                            '${product.name}',
                            ${product.price}
                        )">
                            Add To Cart
                        </button>

                    </div>

                `;

            });

        }

        // SEARCH

        function searchProducts(){

            const value =
                document.getElementById("searchInput")
                .value
                .toLowerCase();

            const filtered = allProducts.filter(product =>
                product.name.toLowerCase().includes(value)
            );

            displayProducts(filtered);

        }

        // ADD TO CART

        async function addToCart(id,name,price){

            await fetch(
                `${BASE_URL}/cart/add`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        userId:localStorage.getItem("user"),
                        productId:id,
                        name:name,
                        price:price
                    })
                }
            );

            alert("Added To Cart");

            loadCart();

        }

        // LOAD CART

        async function loadCart(){

            const response = await fetch(
                `${BASE_URL}/cart/${localStorage.getItem("user")}`
            );

            const cart = await response.json();

            const cartDiv =
                document.getElementById("cartItems");

            cartDiv.innerHTML = "";

            let count = 0;

            if(!cart.items || cart.items.length === 0){

                cartDiv.innerHTML = "<h3>Cart Empty</h3>";

                document.getElementById("cartCount")
                    .innerText = 0;

                return;

            }

            cart.items.forEach(item => {

                count += item.quantity;

                cartDiv.innerHTML += `

                    <div class="cart-item">

                        <h3>${item.name}</h3>

                        <p>Price: ₹${item.price}</p>

                        <p>Quantity: ${item.quantity}</p>

                    </div>

                `;

            });

            document.getElementById("cartCount")
                .innerText = count;

        }

        // PLACE ORDER

        async function placeOrder(){

            const response = await fetch(
                `${BASE_URL}/order/place`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        userId:localStorage.getItem("user")
                    })
                }
            );

            const data = await response.text();

            alert(data);

            loadCart();

        }

    </script>

</body>
</html>
