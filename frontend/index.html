<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Amazingg Store</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#eaeded;
        }

        /* NAVBAR */

        nav{
            background:#131921;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
            position:sticky;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:32px;
            font-weight:bold;
            color:#ff9900;
        }

        .search-box{
            flex:1;
            display:flex;
            max-width:700px;
        }

        .search-box input{
            flex:1;
            padding:12px;
            border:none;
            outline:none;
            font-size:16px;
            border-radius:5px 0 0 5px;
        }

        .search-box button{
            width:70px;
            border:none;
            background:#febd69;
            cursor:pointer;
            border-radius:0 5px 5px 0;
            font-size:18px;
        }

        .nav-links{
            display:flex;
            gap:20px;
            align-items:center;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        .cart-badge{
            background:red;
            padding:4px 10px;
            border-radius:50px;
            font-size:14px;
        }

        /* HERO */

        .hero{
            height:450px;
            background:linear-gradient(to right,#131921,#37475a);
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            padding:20px;
        }

        .hero-content h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .hero-content p{
            font-size:24px;
            margin-bottom:30px;
        }

        .hero-content button{
            padding:15px 35px;
            border:none;
            background:#ff9900;
            color:black;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        /* PRODUCTS */

        .products-section{
            padding:50px 30px;
        }

        .section-title{
            font-size:40px;
            margin-bottom:40px;
            color:#111;
        }

        #products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
            gap:30px;
        }

        .product-card{
            background:white;
            padding:20px;
            border-radius:15px;
            transition:0.3s;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .product-card:hover{
            transform:translateY(-8px);
        }

        .product-card img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
        }

        .product-card h3{
            margin-top:15px;
            font-size:24px;
        }

        .rating{
            color:orange;
            margin-top:10px;
        }

        .price{
            color:green;
            font-size:24px;
            font-weight:bold;
            margin-top:10px;
        }

        .old-price{
            text-decoration:line-through;
            color:gray;
            margin-left:10px;
            font-size:16px;
        }

        .discount{
            color:red;
            font-weight:bold;
            margin-top:10px;
        }

        .product-card button{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            background:#131921;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .product-card button:hover{
            background:#232f3e;
        }

        /* CART */

        .cart-section{
            padding:50px 30px;
        }

        #cartItems{
            margin-top:20px;
        }

        .cart-item{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        }

        .place-order-btn{
            width:300px;
            padding:15px;
            border:none;
            background:green;
            color:white;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
            margin-top:20px;
        }

        /* LOGIN REGISTER */

        .auth-section{
            padding:50px 30px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:30px;
        }

        .auth-box{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .auth-box h2{
            margin-bottom:20px;
        }

        .auth-box input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .auth-box button{
            width:100%;
            padding:12px;
            border:none;
            background:#ff9900;
            font-size:16px;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
        }

        /* FOOTER */

        footer{
            background:#131921;
            color:white;
            text-align:center;
            padding:30px;
            margin-top:50px;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .hero-content h1{
                font-size:40px;
            }

            .hero-content p{
                font-size:18px;
            }

            nav{
                flex-direction:column;
            }

            .search-box{
                width:100%;
            }

        }

    </style>

</head>
<body>

    <!-- NAVBAR -->

    <nav>

        <div class="logo">Amazingg Store</div>

        <div class="search-box">

            <input 
                type="text" 
                placeholder="Search products..."
                id="searchInput"
                onkeyup="searchProducts()"
            >

            <button>🔍</button>

        </div>

        <div class="nav-links">

            <a href="#productsSection">Products</a>
            <a href="#cartSection">Cart</a>
            <a href="#authSection">Login</a>

            <span class="cart-badge" id="cartCount">0</span>

        </div>

    </nav>

    <!-- HERO -->

    <section class="hero">

        <div class="hero-content">

            <h1>Welcome To Amazingg Store</h1>

            <p>India's Professional Full Stack Shopping Website</p>

            <button onclick="scrollToProducts()">
                Shop Now
            </button>

        </div>

    </section>

    <!-- PRODUCTS -->

    <section class="products-section" id="productsSection">

        <h2 class="section-title">Trending Products</h2>

        <div id="products"></div>

    </section>

    <!-- CART -->

    <section class="cart-section" id="cartSection">

        <h2 class="section-title">Your Cart</h2>

        <div id="cartItems"></div>

        <button class="place-order-btn" onclick="placeOrder()">
            Place Order
        </button>

    </section>

    <!-- AUTH -->

    <section class="auth-section" id="authSection">

        <!-- REGISTER -->

        <div class="auth-box">

            <h2>Register</h2>

            <input type="text" id="regName" placeholder="Enter Name">

            <input type="email" id="regEmail" placeholder="Enter Email">

            <input type="password" id="regPassword" placeholder="Enter Password">

            <button onclick="registerUser()">
                Register
            </button>

        </div>

        <!-- LOGIN -->

        <div class="auth-box">

            <h2>Login</h2>

            <input type="email" id="loginEmail" placeholder="Enter Email">

            <input type="password" id="loginPassword" placeholder="Enter Password">

            <button onclick="loginUser()">
                Login
            </button>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <h2>Amazingg Store</h2>

        <p>Full Stack E-Commerce Project using HTML, CSS, JavaScript, Node.js, Express.js and MongoDB</p>

    </footer>

    <script>

        const BASE_URL = "https://codealpha-ecommerce-jkk0.onrender.com";

        let allProducts = [];

        // LOAD PRODUCTS

        async function loadProducts(){

            const response = await fetch(`${BASE_URL}/products`);

            const products = await response.json();

            allProducts = products;

            displayProducts(products);

        }

        // DISPLAY PRODUCTS

        function displayProducts(products){

            const productDiv = document.getElementById("products");

            productDiv.innerHTML = "";

            products.forEach(product => {

                productDiv.innerHTML += `

                    <div class="product-card">

                        <img src="${product.image}" />

                        <h3>${product.name}</h3>

                        <div class="rating">
                            ⭐⭐⭐⭐☆
                        </div>

                        <div class="price">
                            ₹${product.price}
                            <span class="old-price">
                                ₹${product.price + 1000}
                            </span>
                        </div>

                        <div class="discount">
                            40% OFF
                        </div>

                        <p>${product.description}</p>

                        <button onclick="addToCart('${product._id}','${product.name}',${product.price})">
                            Add To Cart
                        </button>

                    </div>

                `;

            });

        }

        // SEARCH PRODUCTS

        function searchProducts(){

            const value = document
                .getElementById("searchInput")
                .value
                .toLowerCase();

            const filtered = allProducts.filter(product =>
                product.name.toLowerCase().includes(value)
            );

            displayProducts(filtered);

        }

        // ADD TO CART

        async function addToCart(id,name,price){

            await fetch(`${BASE_URL}/cart/add`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    userId:"user1",
                    productId:id,
                    name:name,
                    price:price

                })

            });

            alert("Added To Cart");

            loadCart();

        }

        // LOAD CART

        async function loadCart(){

            const response = await fetch(`${BASE_URL}/cart/user1`);

            const cart = await response.json();

            const cartDiv = document.getElementById("cartItems");

            cartDiv.innerHTML = "";

            let count = 0;

            if(!cart.items || cart.items.length === 0){

                cartDiv.innerHTML = "<h3>Cart Empty</h3>";

                document.getElementById("cartCount").innerText = 0;

                return;

            }

            cart.items.forEach(item => {

                count += item.quantity;

                cartDiv.innerHTML += `

                    <div class="cart-item">

                        <h3>${item.name}</h3>

                        <p>Price: ₹${item.price}</p>

                        <p>Quantity: ${item.quantity}</p>

                    </div>

                `;

            });

            document.getElementById("cartCount").innerText = count;

        }

        // PLACE ORDER

        async function placeOrder(){

            const response = await fetch(`${BASE_URL}/order/place`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    userId:"user1"

                })

            });

            const data = await response.text();

            alert(data);

            loadCart();

        }

        // REGISTER

        async function registerUser(){

            const response = await fetch(`${BASE_URL}/register`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    name:document.getElementById("regName").value,

                    email:document.getElementById("regEmail").value,

                    password:document.getElementById("regPassword").value

                })

            });

            const data = await response.text();

            alert(data);

        }

        // LOGIN

        async function loginUser(){

            const response = await fetch(`${BASE_URL}/login`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    email:document.getElementById("loginEmail").value,

                    password:document.getElementById("loginPassword").value

                })

            });

            const data = await response.text();

            alert(data);

        }

        // SCROLL

        function scrollToProducts(){

            document
                .getElementById("productsSection")
                .scrollIntoView({
                    behavior:"smooth"
                });

        }

        loadProducts();

        loadCart();

    </script>

</body>
</html>
